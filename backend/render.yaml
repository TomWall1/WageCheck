services:
  - type: web
    name: wagecheck-api
    env: node
    plan: free
    buildCommand: npm install && node scripts/migrate.js && node scripts/seed.js && node scripts/seed_ma000003.js && node scripts/seed_ma000119.js && node scripts/seed_ma000004.js && node scripts/seed_ma000094.js
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wagecheck-db
          property: connectionString
      - key: ADMIN_SECRET
        generateValue: true

databases:
  - name: wagecheck-db
    databaseName: wagecheck
    user: wagecheck
    plan: free
